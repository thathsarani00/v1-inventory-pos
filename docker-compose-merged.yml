services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: inventory-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: inventory_db
      MYSQL_USER: inventory_user
      MYSQL_PASSWORD: inventory_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - inventory-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Spring Boot Application (Backend API)
  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: inventory-app
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/inventory_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: inventory_user
      SPRING_DATASOURCE_PASSWORD: inventory_pass
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    ports:
      - "5555:5555"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - inventory-network
    restart: unless-stopped

  # Frontend (React App on Nginx)
  frontend:
    image: nginx:alpine
    container_name: inventory-frontend
    ports:
      - "3000:80"
    volumes:
      - /root/frontend/dist:/usr/share/nginx/html:ro
      - /root/frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - inventory-network
    restart: unless-stopped
    depends_on:
      - app

  # phpMyAdmin (Database Management)
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: inventory-phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "8080:80"
    networks:
      - inventory-network
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
    driver: local

networks:
  inventory-network:
